<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christ Faithful Youth</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* BASE RESET */
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    color: white;
    -webkit-text-size-adjust: 100%;
}

/* 🌌 BACKGROUND */
.background {
    position: absolute;
    width: 100%;
    height: 100%;
    background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.88)),
    url('https://images.pexels.com/photos/167491/pexels-photo-167491.jpeg?auto=compress&cs=tinysrgb&w=1600');
    background-size: cover;
    background-position: center;
    animation: skyMove 20s ease-in-out infinite alternate;
    z-index: 0;
}

@keyframes skyMove {
    0% { transform: scale(1); }
    50% { transform: scale(1.05) translateY(-10px); }
    100% { transform: scale(1.02); }
}

/* ✝️ CROSS SCREEN */
.cross-screen {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 18px;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
    cursor: pointer;
    transition: opacity 1s ease;
}

/* CROSS */
.cross {
    font-size: clamp(4.5rem, 10vw, 9rem);
    color: #ffcc00;
    text-shadow:
        0 0 15px rgba(255,204,0,0.9),
        0 0 35px rgba(255,204,0,0.7),
        0 0 70px rgba(255,204,0,0.5);
    animation: floatCross 3s ease-in-out infinite;
}

@keyframes floatCross {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
}

/* INVITE TEXT */
.cross-screen p {
    margin: 0;
    font-size: clamp(1.1rem, 3.5vw, 2rem);
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: #ffcc00;
    text-shadow: 0 0 15px rgba(255,204,0,0.9);
    letter-spacing: 2px;
}

/* BURST */
.burst {
    position: absolute;
    width: 18px;
    height: 18px;
    background: rgba(255,204,0,0.9);
    border-radius: 50%;
    box-shadow: 0 0 25px rgba(255,204,0,0.9);
    animation: burstAnim 0.9s ease-out forwards;
}

@keyframes burstAnim {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(10); opacity: 0; }
}

/* MAIN CONTENT */
.container {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    opacity: 0;
    transform: scale(0.95);
    transition: all 1.5s ease;
}

.container.show {
    opacity: 1;
    transform: scale(1);
}

/* TITLE */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 5.5rem);
    margin: 0;
    line-height: 1.1;
}

h1 span {
    color: #ffd84d;
}

/* IGNITION */
h1 span.ignite {
    animation: igniteFlash 1.2s ease-out forwards, softGlow 3.5s ease-in-out infinite 1.2s;
}

@keyframes igniteFlash {
    0% { transform: scale(0.95); opacity: 0.7; text-shadow: none; }
    40% {
        transform: scale(1.08);
        opacity: 1;
        text-shadow:
            0 0 10px rgba(255,216,77,0.6),
            0 0 25px rgba(255,216,77,0.5),
            0 0 45px rgba(255,216,77,0.35);
    }
    100% {
        transform: scale(1);
        text-shadow:
            0 0 6px rgba(255,216,77,0.25),
            0 0 14px rgba(255,216,77,0.18),
            0 0 24px rgba(255,216,77,0.12);
    }
}

@keyframes softGlow {
    0%,100% {
        text-shadow:
            0 0 6px rgba(255,216,77,0.25),
            0 0 14px rgba(255,216,77,0.18),
            0 0 24px rgba(255,216,77,0.12);
    }
    50% {
        text-shadow:
            0 0 10px rgba(255,216,77,0.4),
            0 0 18px rgba(255,216,77,0.25),
            0 0 30px rgba(255,216,77,0.18);
    }
}

/* VERSE */
.verse {
    margin-top: 30px;
    max-width: min(700px, 90vw);
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    line-height: 1.9;
    padding: 0 20px;
}

/* PSALM */
.verse-tag {
    margin-top: 18px;
    display: inline-block;
    font-size: clamp(1rem, 2vw, 1.3rem);
    font-weight: 600;
    color: #ffcc00;
    text-shadow: 0 0 18px rgba(255,204,0,0.9);
}

/* MOBILE OPTIMIZATION */
@media (max-width: 768px) {
    .background {
        animation: none; /* smoother performance */
    }

    .cross-screen {
        gap: 14px;
    }
}
</style>
</head>

<body>

<div class="background"></div>

<!-- CROSS -->
<div class="cross-screen" id="crossScreen">
    <div class="cross">✝</div>
    <p>GOD HAS INVITED YOU</p>
</div>

<!-- MAIN -->
<div class="container" id="content">

    <h1>
        SEE YOU<br>
        <span>ON SUNDAY</span>
    </h1>

    <div class="verse">
        “This is the day that the Lord has made; let us rejoice and be glad in it.”
        <div class="verse-tag" id="psalm"></div>
    </div>

</div>

<script>
const crossScreen = document.getElementById("crossScreen");
const content = document.getElementById("content");

function typePsalm() {
    const psalm = document.getElementById("psalm");
    const text = "— Psalm 118:24";
    psalm.innerHTML = "";

    text.split("").forEach((char, i) => {
        const span = document.createElement("span");
        span.textContent = char;
        span.style.opacity = "0";
        span.style.transform = "translateY(10px)";
        span.style.transition = "all 0.6s ease";
        psalm.appendChild(span);

        setTimeout(() => {
            span.style.opacity = "1";
            span.style.transform = "translateY(0)";
        }, i * 50);
    });
}

crossScreen.addEventListener("click", (e) => {

    for (let i = 0; i < 12; i++) {
        let burst = document.createElement("div");
        burst.className = "burst";
        burst.style.left = (e.clientX + (Math.random()*120-60)) + "px";
        burst.style.top = (e.clientY + (Math.random()*120-60)) + "px";
        document.body.appendChild(burst);
        setTimeout(() => burst.remove(), 900);
    }

    crossScreen.style.opacity = "0";
    crossScreen.style.pointerEvents = "none";

    setTimeout(() => {
        crossScreen.style.display = "none";
        content.classList.add("show");

        document.querySelector("h1 span").classList.add("ignite");

        setTimeout(() => typePsalm(), 1200);

    }, 900);
});
</script>

</body>
</html>
