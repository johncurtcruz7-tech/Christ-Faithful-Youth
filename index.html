<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christ Faithful Youth</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    color: white;
}

/* 🌌 BACKGROUND */
.background {
    position: absolute;
    width: 100%;
    height: 100%;
    background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.88)),
    url('https://images.pexels.com/photos/167491/pexels-photo-167491.jpeg?auto=compress&cs=tinysrgb&w=1600');
    background-size: cover;
    background-position: center;
    animation: skyMove 20s ease-in-out infinite alternate;
    z-index: 0;
}

@keyframes skyMove {
    0% { transform: scale(1); }
    50% { transform: scale(1.05) translateY(-10px); }
    100% { transform: scale(1.02); }
}

/* ✝️ CROSS SCREEN */
.cross-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 5;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    cursor: pointer;
    text-align: center;
    transition: opacity 1s ease;
}

/* LIGHT RAYS */
.cross-wrapper {
    position: relative;
}

.cross-wrapper::before {
    content: "";
    position: absolute;
    width: 340px;
    height: 340px;
    background: radial-gradient(circle, rgba(255,204,0,0.25), transparent 70%);
    border-radius: 50%;
    animation: rotateRays 10s linear infinite;
}

@keyframes rotateRays {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* CROSS */
.cross {
    font-size: 9rem;
    color: #ffcc00;
    text-shadow:
        0 0 15px rgba(255,204,0,0.9),
        0 0 35px rgba(255,204,0,0.7),
        0 0 70px rgba(255,204,0,0.5);
    animation: floatCross 3s ease-in-out infinite;
    transition: transform 1s ease, opacity 1s ease;
}

@keyframes floatCross {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
}

/* INVITE TEXT */
.cross-screen p {
    margin-top: 28px;
    font-size: 2rem;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: #ffcc00;
    text-shadow: 0 0 15px rgba(255,204,0,0.9);
    letter-spacing: 2px;

    /* ✨ PERFECT CENTER FIX */
    text-align: center;
    width: 100%;
    display: flex;
    justify-content: center;
}

/* BURST PARTICLES */
.burst {
    position: absolute;
    width: 18px;
    height: 18px;
    background: rgba(255,204,0,0.9);
    border-radius: 50%;
    box-shadow: 0 0 25px rgba(255,204,0,0.9);
    animation: burstAnim 0.9s ease-out forwards;
}

@keyframes burstAnim {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(10); opacity: 0; }
}

/* MAIN CONTENT */
.container {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    opacity: 0;
    transform: scale(0.95);
    transition: all 1.5s ease;
}

.container.show {
    opacity: 1;
    transform: scale(1);
}

/* TITLE */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 5.5rem;
    margin: 0;
    line-height: 1.1;
    opacity: 0;
    transform: translateY(30px);
    transition: 1.2s ease;
}

h1.show {
    opacity: 1;
    transform: translateY(0);
}

/* ✨ ON SUNDAY */
h1 span {
    color: #ffd84d;
    text-shadow: none;
    transition: text-shadow 0.8s ease, transform 0.8s ease;
}

/* 🔥 IGNITION + SOFT GLOW */
h1 span.ignite {
    animation: igniteFlash 1.2s ease-out forwards, softGlow 3.5s ease-in-out infinite 1.2s;
}

@keyframes igniteFlash {
    0% {
        text-shadow: none;
        transform: scale(0.95);
        opacity: 0.7;
    }
    40% {
        text-shadow:
            0 0 10px rgba(255, 216, 77, 0.6),
            0 0 25px rgba(255, 216, 77, 0.5),
            0 0 45px rgba(255, 216, 77, 0.35);
        transform: scale(1.08);
        opacity: 1;
    }
    100% {
        text-shadow:
            0 0 6px rgba(255, 216, 77, 0.25),
            0 0 14px rgba(255, 216, 77, 0.18),
            0 0 24px rgba(255, 216, 77, 0.12);
        transform: scale(1);
    }
}

@keyframes softGlow {
    0%, 100% {
        text-shadow:
            0 0 6px rgba(255, 216, 77, 0.25),
            0 0 14px rgba(255, 216, 77, 0.18),
            0 0 24px rgba(255, 216, 77, 0.12);
    }
    50% {
        text-shadow:
            0 0 10px rgba(255, 216, 77, 0.4),
            0 0 18px rgba(255, 216, 77, 0.25),
            0 0 30px rgba(255, 216, 77, 0.18);
    }
}

/* VERSE */
.verse {
    margin-top: 30px;
    max-width: 700px;
    font-size: 1.3rem;
    line-height: 1.9;
    opacity: 0;
    transform: translateY(25px);
    transition: 1.2s ease;
}

.verse.show {
    opacity: 1;
    transform: translateY(0);
}

/* PSALM */
.verse-tag {
    margin-top: 18px;
    display: inline-block;
    font-size: 1.3rem;
    font-weight: 600;
    color: #ffcc00;
    text-shadow: 0 0 18px rgba(255,204,0,0.9);
}

.verse-tag span {
    display: inline-block;
    opacity: 0;
    transform: translateY(10px);
    transition: 0.6s ease;
}
</style>
</head>

<body>

<div class="background"></div>

<!-- CROSS -->
<div class="cross-screen" id="crossScreen">
    <div class="cross-wrapper">
        <div class="cross">✝</div>
    </div>
    <p>GOD HAS INVITED YOU</p>
</div>

<!-- MAIN -->
<div class="container" id="content">

    <h1 id="title">
        SEE YOU<br>
        <span>ON SUNDAY</span>
    </h1>

    <div class="verse" id="verse">
        “This is the day that the Lord has made; let us rejoice and be glad in it.”
        <div class="verse-tag" id="psalm"></div>
    </div>

</div>

<script>
const crossScreen = document.getElementById("crossScreen");
const content = document.getElementById("content");
const title = document.getElementById("title");
const verse = document.getElementById("verse");
const psalm = document.getElementById("psalm");

const text = "— Psalm 118:24";

/* PSALM TYPE */
function typePsalm() {
    psalm.innerHTML = "";

    const letters = text.split("");

    letters.forEach((char, index) => {
        const span = document.createElement("span");
        span.textContent = char;

        // initial soft state
        span.style.opacity = "0";
        span.style.transform = "translateY(12px)";
        span.style.filter = "blur(4px)";
        span.style.transition = "all 0.8s ease";

        psalm.appendChild(span);

        setTimeout(() => {
            requestAnimationFrame(() => {
                span.style.opacity = "1";
                span.style.transform = "translateY(0)";
                span.style.filter = "blur(0)";
            });
        }, index * 60); // smoother and faster flow
    });
}

/* CLICK EVENT */
crossScreen.addEventListener("click", (e) => {

    crossScreen.classList.add("active");

    /* ✨ BURST */
    for (let i = 0; i < 12; i++) {
        let burst = document.createElement("div");
        burst.className = "burst";
        burst.style.left = (e.clientX + (Math.random()*120-60)) + "px";
        burst.style.top = (e.clientY + (Math.random()*120-60)) + "px";
        document.body.appendChild(burst);

        setTimeout(() => burst.remove(), 900);
    }

    setTimeout(() => {
        crossScreen.style.opacity = "0";
        crossScreen.style.pointerEvents = "none";
    }, 900);

    setTimeout(() => {
        crossScreen.style.display = "none";

        content.classList.add("show");

        setTimeout(() => {
            title.classList.add("show");
            title.querySelector("span").classList.add("ignite"); // 🔥 SYNC TRIGGER
        }, 600);

        setTimeout(() => verse.classList.add("show"), 1000);
        setTimeout(() => typePsalm(), 1700);

    }, 1200);
});
</script>

</body>
</html>
